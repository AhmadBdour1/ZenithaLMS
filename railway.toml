# Railway Deployment Configuration

web: php artisan serve --host=0.0.0.0 --port=$PORT

build:
  builder: nixpacks
  buildPhases:
    - name: install
      cmd: |
        composer install --no-dev --optimize-autoloader
        npm install
    - name: build
      cmd: |
        npm run build
    - name: prepare
      cmd: |
        php artisan key:generate --force
        php artisan storage:link

deploy:
  startCommand: php artisan serve --host=0.0.0.0 --port=$PORT
  restartPhases:
    - name: migrate
      cmd: php artisan migrate --force
    - name: seed
      cmd: php artisan db:seed --force

# Environment Variables (set these in Railway dashboard)
env:
  - key: APP_ENV
    value: production
  - key: APP_DEBUG
    value: false
  - key: APP_URL
    value: ${RAILWAY_PUBLIC_URL}
  - key: DB_CONNECTION
    value: sqlite
  - key: DB_DATABASE
    value: /tmp/database.sqlite
  - key: CACHE_DRIVER
    value: array
  - key: SESSION_DRIVER
    value: array
  - key: LOG_CHANNEL
    value: errorlog
  - key: LOG_LEVEL
    value: error
